<!DOCTYPE html>
<html>
    <head>
        <title>Student Productivity Portal</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <header>
    <h1>Enroll For a Student Portal</h1>
    <p>Register for Daily Tasks Track Here!</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="tasks.html">Task</a>
    </nav>
    <Section>
        <form>
            <label>Name:</label>
            <input type="text"><br><br>
            <label>Email:</label>
            <input type="email"><br><br>
            <label>Password:</label>
            <input type="password"><br><br>
            <label>Gender:</label>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">Female<br><br>
            <label>Skills :</label>
            <input type="checkbox" name="skills">Java
            <input type="checkbox" name="skills">Python
            <input type="checkbox" name="skills">HTML<br><br>
            <label>Hobbies:</label>
            <select>
                <option>Dancing</option>
                <option>Singing</option>
                <option>Painting</option>
            </select><br><br>
            <button type="submit">Register</button>
        </form>
    </Section>
</html>
